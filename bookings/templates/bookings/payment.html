{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div
        style="background: var(--primary-color); color: #fff; padding: 2rem; border-radius: var(--radius) var(--radius) 0 0; text-align: center;">
        <h2 style="color: #fff; margin-bottom: 0.5rem;">Payment Details</h2>
        <p style="opacity: 0.9;">Complete your booking for <strong>{{ booking.event.title }}</strong></p>
        <div style="font-size: 2.5rem; font-weight: 700; margin-top: 1rem;">₹{{ booking.total_price }}</div>
    </div>

    <form method="post" style="border-radius: 0 0 var(--radius) var(--radius); margin-top: 0; max-width: 100%;">
        {% csrf_token %}
        <h3 style="text-align: left; font-size: 1.2rem; margin-bottom: 1.5rem;">
            <i class="far fa-credit-card"></i> Enter Card Information
        </h3>

        <div style="margin-bottom: 1.5rem;">
            <label for="id_card_number">Card Number</label>
            <div style="position: relative;">
                {{ form.card_number }}
                <i class="fas fa-lock"
                    style="position: absolute; right: 15px; top: 15px; color: var(--text-light);"></i>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
            <div>
                <label for="id_expiry_date">Expiry Date</label>
                {{ form.expiry_date }}
            </div>
            <div>
                <label for="id_cvv">CVV</label>
                {{ form.cvv }}
            </div>
        </div>

        <button type="submit" style="width: 100%; margin-top: 1.5rem;">
            Pay ₹{{ booking.total_price }} <i class="fas fa-check-circle"></i>
        </button>

        <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-light);">
            <i class="fas fa-shield-alt"></i> Secure Payment Processing
        </p>
    </form>
</div>
{% endblock %}
