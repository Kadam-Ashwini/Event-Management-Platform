{% extends 'base.html' %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem; max-width: 600px; margin: 0 auto;">
    <div
        style="width: 80px; height: 80px; background: #C6F6D5; color: #22543D; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto 2rem;">
        <i class="fas fa-check"></i>
    </div>
    <h2 style="color: var(--primary-color); margin-bottom: 1rem;">Booking Confirmed!</h2>
    <p style="font-size: 1.1rem; color: var(--text-light); margin-bottom: 2rem;">
        Thank you for your booking. Your payment has been processed successfully.
    </p>
    <div style="display: flex; gap: 15px; justify-content: center;">
        <a href="{% url 'event_list' %}" class="button">Browse More Events</a>
        <a href="{% url 'submit_feedback' booking.event.id %}" class="button secondary">Give Feedback</a>
    </div>
</div>
{% endblock %}
