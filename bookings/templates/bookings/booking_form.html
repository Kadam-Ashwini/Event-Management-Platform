{% extends 'base.html' %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <h3><i class="fas fa-utensils"></i> Select Food Items</h3>
    <p style="text-align: center; color: var(--text-light);">Enhance your experience with our delicious food options.
    </p>

    <div style="margin-bottom: 20px;">
        <label style="margin-bottom: 10px;">Available Items:</label>
        <div style="display: grid; gap: 10px;">
            {{ form.food_items }}
        </div>
    </div>

    <button type="submit" style="width: 100%;">Proceed to Payment <i class="fas fa-arrow-right"></i></button>
</form>
{% endblock %}
