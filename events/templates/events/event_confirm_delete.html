{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin: 0 auto; padding: 2rem; text-align: center;">
    <h2>Confirm Deletion</h2>
    <p>Are you sure you want to delete the event "{{ event.title }}"?</p>
    <p style="color: var(--danger-color); font-weight: bold;">This action cannot be undone.</p>

    <form method="post">
        {% csrf_token %}
        <div class="actions" style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
            <button type="submit" class="button" style="background-color: var(--danger-color);">Yes, Delete</button>
            <a href="{% url 'event_detail' event.id %}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
