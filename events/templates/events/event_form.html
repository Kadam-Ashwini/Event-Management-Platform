{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 800px; margin: 0 auto; padding: 2rem;">
    <h2>{{ title }}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            {{ form.as_p }}
        </div>
        <div class="actions" style="margin-top: 20px;">
            <button type="submit" class="button">Save Event</button>
            <a href="{% url 'event_list' %}" class="button secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
