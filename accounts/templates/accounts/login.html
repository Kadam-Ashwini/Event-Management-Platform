{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background-image: url('{{ MEDIA_URL }}login_bg.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }

    /* Overlay to ensure text readability if needed, though card has white bg */
    body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.4);
        z-index: -1;
    }

    .login-container {
        min-height: 80vh;
        /* Adjust as needed to center vertically */
        display: flex;
        align-items: center;
        justify-content: center;
    }
</style>

<div class="login-container">
    <div
        style="background: white; padding: 3rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 450px;">
        <form method="post" style="box-shadow: none; padding: 0; margin: 0; max-width: 100%;">
            {% csrf_token %}
            <div style="text-align: center; margin-bottom: 2rem;">
                <h3 style="margin-bottom: 0.5rem; color: var(--primary-color); font-size: 2rem;"><i
                        class="fas fa-sign-in-alt"></i> Welcome Back!</h3>
                <p style="color: var(--text-light);">Please login to your account</p>
            </div>

            {% if form.errors %}
            <div class="error"
                style="padding: 10px; border-radius: 5px; margin-bottom: 15px; background-color: #FED7D7; color: #822727;">
                <p style="margin: 0;"><i class="fas fa-exclamation-circle"></i> Invalid username or password.</p>
            </div>
            {% endif %}

            <p>
                <label for="id_username" style="display: block; margin-bottom: 5px; font-weight: 600;">Username:</label>
                {{ form.username }}
            </p>
            <p>
                <label for="id_password" style="display: block; margin-bottom: 5px; font-weight: 600;">Password:</label>
                {{ form.password }}
            </p>

            <button type="submit"
                style="width: 100%; margin-top: 15px; padding: 12px; font-size: 1.1rem;">Login</button>

            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-light);">
                Don't have an account? <a href="{% url 'register' %}"
                    style="color: var(--primary-color); font-weight: 600;">Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
