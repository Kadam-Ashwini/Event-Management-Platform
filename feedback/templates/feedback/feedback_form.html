{% extends 'base.html' %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <h3><i class="fas fa-comment-alt"></i> Share Your Feedback</h3>
    <p style="text-align: center; color: var(--text-light);">We value your opinion! Let us know about your experience.
    </p>

    {{ form.as_p }}

    <button type="submit" style="width: 100%;">Submit Feedback <i class="fas fa-paper-plane"></i></button>
</form>
{% endblock %}
